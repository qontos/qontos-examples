name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-file-tree:
    name: Validate README file references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all referenced files exist
        run: |
          set -e
          MISSING=0
          while IFS= read -r file; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing file referenced in README: $file"
              MISSING=$((MISSING + 1))
            fi
          done <<'EOF'
          examples/python/submit_job.py
          examples/python/async_jobs.py
          examples/python/execution_proof.py
          examples/python/result_inspection.py
          examples/python/circuit_normalization.py
          examples/partitioning/greedy_partition.py
          examples/partitioning/spectral_partition.py
          examples/providers/local_simulator.py
          examples/providers/ibm_quantum.py
          examples/providers/amazon_braket.py
          examples/providers/native_qontos.py
          notebooks/01_hello_qubit.ipynb
          notebooks/02_bell_state.ipynb
          notebooks/03_partitioning.ipynb
          notebooks/04_multi_backend.ipynb
          notebooks/05_vqe_h2.ipynb
          EOF
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING files referenced in README are missing"
            exit 1
          fi
          echo "✓ All README-referenced files exist"

  offline-examples:
    name: Run Offline Examples
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run offline-safe examples
        run: |
          echo "=== Offline examples ==="
          python examples/python/circuit_normalization.py
          python examples/python/execution_proof.py
          python examples/partitioning/greedy_partition.py
          python examples/partitioning/spectral_partition.py
      - name: Run local-simulator examples
        run: |
          echo "=== Local simulator examples ==="
          python examples/python/submit_job.py
          python examples/providers/local_simulator.py
      - name: Syntax-check all remaining examples
        run: |
          echo "=== Syntax validation ==="
          python -m py_compile examples/python/async_jobs.py
          python -m py_compile examples/python/result_inspection.py
          python -m py_compile examples/providers/ibm_quantum.py
          python -m py_compile examples/providers/amazon_braket.py
          python -m py_compile examples/providers/native_qontos.py
          echo "✓ All examples pass syntax check"

  notebook-validation:
    name: Validate Notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbconvert nbformat
      - name: Validate notebook JSON structure
        run: |
          python -c "
          import json, pathlib, sys
          errors = 0
          for nb in sorted(pathlib.Path('notebooks').glob('*.ipynb')):
              try:
                  data = json.loads(nb.read_text())
                  assert 'cells' in data, f'No cells key in {nb.name}'
                  assert 'metadata' in data, f'No metadata key in {nb.name}'
                  assert len(data['cells']) > 0, f'No cells in {nb.name}'
                  # Check first cell is markdown (title)
                  assert data['cells'][0]['cell_type'] == 'markdown', f'First cell not markdown in {nb.name}'
                  print(f'  ✓ {nb.name}: {len(data[\"cells\"])} cells')
              except Exception as e:
                  print(f'  ✗ {nb.name}: {e}')
                  errors += 1
          if errors:
              sys.exit(1)
          print(f'All {len(list(pathlib.Path(\"notebooks\").glob(\"*.ipynb\")))} notebooks valid')
          "
      - name: Execute beginner notebooks
        run: |
          jupyter nbconvert --to notebook --execute \
            --ExecutePreprocessor.timeout=120 \
            --ExecutePreprocessor.kernel_name=python3 \
            notebooks/01_hello_qubit.ipynb \
            --output /tmp/01_executed.ipynb 2>&1 || echo "::warning::01_hello_qubit execution failed"
          jupyter nbconvert --to notebook --execute \
            --ExecutePreprocessor.timeout=120 \
            --ExecutePreprocessor.kernel_name=python3 \
            notebooks/02_bell_state.ipynb \
            --output /tmp/02_executed.ipynb 2>&1 || echo "::warning::02_bell_state execution failed"
