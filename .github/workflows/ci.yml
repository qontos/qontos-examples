name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  examples:
    name: Run Python Examples
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run circuit normalization example
        run: python examples/python/circuit_normalization.py

      - name: Run greedy partitioning example
        run: python examples/partitioning/greedy_partition.py

      - name: Run spectral partitioning example
        run: python examples/partitioning/spectral_partition.py

      - name: Run local simulator example
        run: python examples/providers/local_simulator.py
